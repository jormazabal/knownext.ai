name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend test dependencies
        run: python -m pip install -e './backend[test]'

      - name: Install backend packaging dependencies
        run: python -m pip install pyinstaller

      - name: Run release gate
        run: pnpm release:check

      - name: Build backend sidecar
        shell: pwsh
        run: ./scripts/build-backend-sidecar.ps1

      - name: Import Windows code signing certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            Write-Host "WINDOWS_CERTIFICATE secret is not configured; Windows Authenticode signing will be skipped."
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw "WINDOWS_CERTIFICATE_PASSWORD secret is required when WINDOWS_CERTIFICATE is configured."
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "knownext-windows-signing.pfx"
          [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE) | Set-Content -LiteralPath $certificatePath -AsByteStream
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $certificate = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          if (-not $certificate.Thumbprint) {
            throw "Imported Windows signing certificate did not expose a thumbprint."
          }

          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WINDOWS_TIMESTAMP_URL=http://timestamp.digicert.com" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign backend sidecar
        shell: pwsh
        run: ./scripts/sign-windows.ps1 ./apps/desktop/src-tauri/binaries/knownext-backend-x86_64-pc-windows-msvc.exe

      - name: Test backend sidecar
        shell: pwsh
        run: |
          $env:KNOWNEXT_APP_DATA_DIR = Join-Path $env:RUNNER_TEMP "knownext-sidecar-data"
          $env:KNOWNEXT_API_HOST = "127.0.0.1"
          $env:KNOWNEXT_API_PORT = "8765"
          $expectedVersion = (Get-Content ./VERSION -Raw).Trim()
          $stdoutPath = Join-Path $env:RUNNER_TEMP "knownext-backend.stdout.log"
          $stderrPath = Join-Path $env:RUNNER_TEMP "knownext-backend.stderr.log"
          New-Item -ItemType Directory -Force -Path $env:KNOWNEXT_APP_DATA_DIR | Out-Null
          $process = Start-Process `
            -FilePath "./apps/desktop/src-tauri/binaries/knownext-backend-x86_64-pc-windows-msvc.exe" `
            -PassThru `
            -WindowStyle Hidden `
            -RedirectStandardOutput $stdoutPath `
            -RedirectStandardError $stderrPath
          try {
            $healthy = $false
            for ($i = 0; $i -lt 40; $i++) {
              if ($process.HasExited) {
                Write-Host "Backend sidecar exited with code $($process.ExitCode)."
                break
              }
              try {
                $response = Invoke-RestMethod -UseBasicParsing -Uri "http://127.0.0.1:8765/health" -TimeoutSec 1
                if ($response.status -eq "ok" -and $response.version -eq $expectedVersion) {
                  $healthy = $true
                  break
                }
                Write-Host "Unexpected /health response: status=$($response.status); version=$($response.version); expected=$expectedVersion"
              } catch {
                Write-Host "Waiting for backend sidecar: $($_.Exception.Message)"
              }
              Start-Sleep -Milliseconds 500
            }
            if (-not $healthy) {
              if (Test-Path $stdoutPath) {
                Write-Host "Backend stdout:"
                Get-Content $stdoutPath
              }
              if (Test-Path $stderrPath) {
                Write-Host "Backend stderr:"
                Get-Content $stderrPath
              }
              throw "Backend sidecar did not pass /health."
            }
          } finally {
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Build Tauri Windows release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: KnowNext.ai __VERSION__
          releaseBody: See docs/releases for the release notes and installable assets.
          releaseDraft: true
          prerelease: false
          tauriScript: pnpm tauri
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
